# Root-level tooling config. Each plugin keeps its own pyproject.toml for
# packaging; this file centralizes the ty type checker so all three share
# one config.

[tool.ty.src]
# scheme.py / storage.py files are loaded dynamically via
# spec_from_file_location (not importable by name — dozens share the filename
# `scheme` / `storage`), so ty can't resolve them as modules. They're
# type-checked in the editor via pyright; here we check the importable
# Python packages only.
include = [
  "artifact-plugin/scripts",
  "artifact-plugin/hooks",
  "artifact-github-plugin/scripts",
  "artifact-documents-plugin/scripts",
]
exclude = ["**/tests/**", "**/dist/**", "**/build/**", "**/.venv/**"]

[tool.ty.environment]
python-version = "3.11"
# The three plugins each expose an importable Python package under `scripts/`;
# add them so `from artifactlib…` / `from artifactlib_gh…` / `from
# artifactlib_docs…` resolve.
extra-paths = [
  "artifact-plugin/scripts",
  "artifact-github-plugin/scripts",
  "artifact-documents-plugin/scripts",
]

[tool.coverage.run]
branch = true
source = [
  "artifact-plugin/scripts",
  "artifact-plugin/hooks",
  "artifact-github-plugin/scripts",
  "artifact-documents-plugin/scripts",
]
omit = [
  "*/tests/*",
  "*/conftest.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]
